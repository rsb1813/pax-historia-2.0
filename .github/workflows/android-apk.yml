name: Build Android APK

# Builds the thin Android client (mobile/) and attaches the APK to the
# rolling "android" release, so players just download and install — no
# Android SDK needed on anyone's machine. Run it from the Actions tab
# (workflow_dispatch) after changing mobile/, or push an android-v* tag.

on:
  workflow_dispatch:
  push:
    tags: ["android-v*"]

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Stamp the build number
        # The connect screen compares this against "Build: N" in the release
        # notes on every launch — that's the APK self-update check.
        run: sed -i "s/__APP_BUILD__/${{ github.run_number }}/" mobile/www/index.html

      - name: Build the APK
        run: |
          cd mobile
          npm ci
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Collect
        run: cp mobile/android/app/build/outputs/apk/debug/app-debug.apk pax-historia.apk

      - uses: actions/upload-artifact@v4
        with:
          name: pax-historia-apk
          path: pax-historia.apk

      - name: Publish to the rolling "android" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="Thin Android client — connects to your Pax Historia server (Termux on the same phone, or any host on your network). Download pax-historia.apk below and open it to install (allow installs from your browser when Android asks). On first launch it finds a Termux server on the same phone automatically, and the app updates itself when a newer build is published here.

          Build: ${{ github.run_number }}"
          gh release create android --title "Android app" --notes "$NOTES" 2>/dev/null \
            || gh release edit android --notes "$NOTES"
          gh release upload android pax-historia.apk --clobber
